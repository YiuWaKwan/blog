<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>George's Blog</title>
  <script>
    (function () {
      var theme = 'dark';
      try {
        var saved = localStorage.getItem('blog-theme');
        if (saved === 'light' || saved === 'dark') theme = saved;
      } catch (_) {}
      document.documentElement.setAttribute('data-theme', theme);
      document.documentElement.style.colorScheme = theme;
    })();
  </script>
  <script src="/static/js/theme.js"></script>
  <link rel="stylesheet" href="/static/css/base.css">
  <link rel="stylesheet" href="/static/css/theme.css">
  <link rel="stylesheet" href="/static/css/responsive.css">
  <link rel="stylesheet" href="/static/css/landing.css">
</head>
<body class="landing">
  <div class="page-bg landing__bg" aria-hidden="true">
    <canvas id="cover-canvas" class="landing__canvas"></canvas>
    <div class="page-bg__overlay landing__overlay"></div>
  </div>

  <div class="landing__content">
    <nav class="landing__nav">
      <span class="landing__logo">George's Blog</span>
      <button type="button" class="theme-toggle" aria-label="切换深色模式" onclick="toggleTheme()">
        <span class="theme-toggle__to-dark" aria-hidden="true">🌙</span>
        <span class="theme-toggle__to-light" aria-hidden="true">☀️</span>
      </button>
    </nav>

    <section class="landing__hero">
      <div class="landing__clock" aria-live="polite">
        <div class="landing__clock-time" id="clock-time">00:00:00</div>
        <div class="landing__clock-date">
          <span id="clock-date">—</span>
          <span class="landing__clock-week" id="clock-week">—</span>
        </div>
      </div>

      <div class="landing__eyebrow">
        <span class="landing__eyebrow-dot"></span>
        Personal Knowledge Space
      </div>

      <h1 class="landing__title">George's Blog</h1>
      <p class="landing__subtitle">
        记录技术探索与学习笔记<br>
        在代码与思考之间，构建属于自己的知识宇宙
      </p>

      <div class="landing__actions">
        <a href="/pages/" class="landing__cta">
          进入博客
          <span class="landing__cta-arrow">→</span>
        </a>
        <a href="/pages/notes/list" class="landing__cta landing__cta--ghost">浏览笔记</a>
      </div>

      <div class="landing__stats" id="landing-stats">
        <div>
          <div class="landing__stat-value" data-stat="posts">—</div>
          <div class="landing__stat-label">博客文章</div>
        </div>
        <div>
          <div class="landing__stat-value" data-stat="notes">—</div>
          <div class="landing__stat-label">学习笔记</div>
        </div>
        <div>
          <div class="landing__stat-value" data-stat="tags">—</div>
          <div class="landing__stat-label">标签分类</div>
        </div>
      </div>
    </section>

    <footer class="landing__footer">
      © 2026 George's Blog · Crafted with FastAPI
    </footer>
  </div>

  <script src="/static/js/aurora-bg.js"></script>
  <script src="/static/js/api.js"></script>
  <script src="/static/js/page-bg.js"></script>
  <script src="/static/js/landing.js"></script>
</body>
</html>
