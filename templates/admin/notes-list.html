<!DOCTYPE html>
<html lang="zh-CN">
<head>
  {% include "partials/head.html" %}
  <link rel="stylesheet" href="/static/css/admin.css">
  <title>笔记管理 — 后台管理</title>
</head>
<body>
  <div class="admin-layout">
    {% set admin_active = 'notes' %}
    {% include "partials/admin-sidebar.html" %}
    <main class="admin-main">
      <div class="admin-header">
        <h1 class="admin-header__title">笔记管理</h1>
        <a href="/pages/admin/notes-edit" class="btn btn--primary">新建笔记</a>
      </div>
      <!-- API: POST /api/admin/get_notes  Body: {page, limit, keyword?} -->
      <div class="table-wrapper">
        <table class="admin-table">
          <thead>
            <tr><th>标题</th><th>标签</th><th>状态</th><th>操作</th></tr>
          </thead>
          <tbody>
            <tr>
              <td>Python 基础语法整理</td>
              <td><span class="tag-pill">Python</span> <span class="tag-pill">+1</span></td>
              <td>已发布</td>
              <td class="admin-table__actions"><a href="/pages/admin/notes-edit">编辑</a></td>
            </tr>
          </tbody>
        </table>
      </div>
    </main>
  </div>
</body>
</html>
