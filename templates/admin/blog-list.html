<!DOCTYPE html>
<html lang="zh-CN">
<head>
  {% include "partials/head.html" %}
  <link rel="stylesheet" href="/static/css/admin.css">
  <title>博客管理 — 后台管理</title>
</head>
<body>
  <div class="admin-layout">
    {% set admin_active = 'blog' %}
    {% include "partials/admin-sidebar.html" %}
    <main class="admin-main">
      <div class="admin-header">
        <h1 class="admin-header__title">博客管理</h1>
        <a href="/pages/admin/blog-edit" class="btn btn--primary">新建文章</a>
      </div>

      <div class="table-wrapper">
        <table class="admin-table">
          <thead>
            <tr><th>标题</th><th>标签</th><th>状态</th><th>发布时间</th><th>操作</th></tr>
          </thead>
          <tbody id="blog-list-body">
            <tr><td colspan="5">加载中…</td></tr>
          </tbody>
        </table>
      </div>
    </main>
  </div>
  <script src="/static/js/api.js"></script>
  <script src="/static/js/admin.js"></script>
  <script src="/static/js/admin-blog-list.js"></script>
</body>
</html>
