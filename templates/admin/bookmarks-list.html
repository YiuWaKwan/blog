<!DOCTYPE html>
<html lang="zh-CN">
<head>
  {% include "partials/head.html" %}
  <link rel="stylesheet" href="/static/css/admin.css">
  <title>收藏管理 — 后台管理</title>
</head>
<body>
  <div class="admin-layout">
    {% set admin_active = 'bookmarks' %}
    {% include "partials/admin-sidebar.html" %}
    <main class="admin-main">
      <div class="admin-header">
        <h1 class="admin-header__title">收藏管理</h1>
        <a href="/pages/admin/bookmarks-edit" class="btn btn--primary">新建收藏</a>
      </div>

      <details class="admin-import-panel">
        <summary class="admin-import-panel__summary">分组管理</summary>
        <form class="admin-import-panel__form" id="bookmark-category-form">
          <p class="admin-import-panel__hint">新增收藏分组，Slug 留空则根据名称自动生成。</p>
          <div class="admin-import-panel__actions">
            <input
              type="text"
              id="bookmark-category-name"
              class="form-input admin-category-form__input"
              placeholder="分组名称"
              required
              autocomplete="off"
            />
            <input
              type="text"
              id="bookmark-category-slug"
              class="form-input admin-category-form__input"
              placeholder="Slug（可选）"
              autocomplete="off"
            />
            <button type="submit" class="btn btn--primary">新增分组</button>
            <span id="bookmark-category-result" class="admin-import-panel__result" hidden></span>
          </div>
        </form>
        <ul class="admin-category-list" id="bookmark-categories-list">
          <li class="admin-category-list__loading">加载中…</li>
        </ul>
      </details>

      <details class="admin-import-panel">
        <summary class="admin-import-panel__summary">批量导入 URL</summary>
        <form class="admin-import-panel__form" id="bookmarks-import-form">
          <p class="admin-import-panel__hint">每行一个 URL，空行和以 # 开头的行会跳过。无协议时自动补全 https://</p>
          <textarea
            id="bookmarks-import-text"
            class="form-textarea admin-import-panel__textarea"
            rows="8"
            placeholder="https://example.com&#10;github.com/user/repo&#10;# 这是注释，会被跳过"
          ></textarea>
          <div class="admin-import-panel__actions">
            <button type="submit" class="btn btn--primary">导入保存</button>
            <span id="bookmarks-import-result" class="admin-import-panel__result" hidden></span>
          </div>
        </form>
      </details>

      <div class="admin-category-filter" id="bookmark-category-filter" hidden>
        <span class="admin-category-filter__label">按分组筛选</span>
        <div class="admin-category-filter__pills" id="bookmark-category-filter-pills"></div>
      </div>

      <div class="admin-bookmark-groups" id="bookmarks-grouped-list">
        <p class="admin-bookmark-groups__loading">加载中…</p>
      </div>
    </main>
  </div>
  <script src="/static/js/api.js"></script>
  <script src="/static/js/admin.js"></script>
  <script src="/static/js/admin-bookmarks-list.js"></script>
</body>
</html>
