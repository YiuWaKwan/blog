<!DOCTYPE html>
<html lang="zh-CN">
<head>
  {% include "partials/head.html" %}
  <link rel="stylesheet" href="/static/css/admin.css">
  <title>收藏管理 — 后台管理</title>
</head>
<body>
  <div class="admin-layout">
    {% set admin_active = 'bookmarks' %}
    {% include "partials/admin-sidebar.html" %}
    <main class="admin-main">
      <div class="admin-header">
        <h1 class="admin-header__title">收藏管理</h1>
        <a href="/pages/admin/bookmarks-edit" class="btn btn--primary">新建收藏</a>
      </div>

      <details class="admin-import-panel">
        <summary class="admin-import-panel__summary">批量导入 URL</summary>
        <form class="admin-import-panel__form" id="bookmarks-import-form">
          <p class="admin-import-panel__hint">每行一个 URL，空行和以 # 开头的行会跳过。无协议时自动补全 https://</p>
          <textarea
            id="bookmarks-import-text"
            class="form-textarea admin-import-panel__textarea"
            rows="8"
            placeholder="https://example.com&#10;github.com/user/repo&#10;# 这是注释，会被跳过"
          ></textarea>
          <div class="admin-import-panel__actions">
            <button type="submit" class="btn btn--primary">导入保存</button>
            <span id="bookmarks-import-result" class="admin-import-panel__result" hidden></span>
          </div>
        </form>
      </details>

      <div class="table-wrapper">
        <table class="admin-table">
          <thead>
            <tr><th>标题</th><th>URL</th><th>分类</th><th>状态</th><th>标签</th><th>操作</th></tr>
          </thead>
          <tbody id="bookmarks-list-body">
            <tr><td colspan="6">加载中…</td></tr>
          </tbody>
        </table>
      </div>
    </main>
  </div>
  <script src="/static/js/api.js"></script>
  <script src="/static/js/admin.js"></script>
  <script src="/static/js/admin-bookmarks-list.js"></script>
</body>
</html>
