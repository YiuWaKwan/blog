<nav class="firefly-nav">
  <div class="firefly-nav__inner">
    <a href="/pages/" class="firefly-nav__brand">
      <span class="firefly-nav__logo" aria-hidden="true">✦</span>
      <span>Personal Blog</span>
    </a>

    <button type="button" class="firefly-nav__toggle" id="nav-toggle" aria-label="菜单">☰</button>

    <div class="firefly-nav__links" id="nav-links">
      <a href="/pages/" class="firefly-nav__link {% if active == 'home' %}is-active{% endif %}">🏠 主页</a>
      <a href="/pages/blog/list" class="firefly-nav__link {% if active == 'blog' %}is-active{% endif %}">📄 文章</a>
      <a href="/pages/notes/list" class="firefly-nav__link {% if active == 'notes' %}is-active{% endif %}">📝 笔记</a>
      <a href="/pages/tags/" class="firefly-nav__link {% if active == 'tags' %}is-active{% endif %}">🏷 标签</a>
    </div>

    <div class="firefly-nav__actions">
      <form class="firefly-nav__search" action="/pages/search" method="get" role="search">
        <span class="firefly-nav__search-icon" aria-hidden="true">🔍</span>
        <input
          type="search"
          name="q"
          class="firefly-nav__search-input"
          placeholder="搜索"
          aria-label="搜索"
          value="{{ search_q or '' }}"
          required
        >
      </form>
      {% include "partials/theme-customizer.html" %}
      <button type="button" class="theme-toggle" aria-label="切换深色模式" onclick="toggleTheme()">
        <span class="theme-toggle__to-dark" aria-hidden="true">🌙</span>
        <span class="theme-toggle__to-light" aria-hidden="true">☀️</span>
      </button>
    </div>
  </div>
</nav>
