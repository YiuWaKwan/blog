<div class="theme-panel" id="theme-panel" hidden>
  <div class="theme-panel__header">
    <h3 class="theme-panel__title">主题设置</h3>
    <div class="theme-panel__header-actions">
      <button type="button" class="theme-panel__icon-btn" id="theme-panel-reset" title="恢复默认" aria-label="恢复默认">↺</button>
      <button type="button" class="theme-panel__icon-btn" id="theme-panel-close" title="关闭" aria-label="关闭">✕</button>
    </div>
  </div>

  <section class="theme-panel__section">
    <div class="theme-panel__label-row">
      <span class="theme-panel__label">主题色相</span>
      <span class="theme-panel__value" id="theme-hue-value">152</span>
    </div>
    <input type="range" id="theme-hue" class="theme-panel__range theme-panel__range--hue" min="0" max="360" value="152">
  </section>

  <section class="theme-panel__section">
    <div class="theme-panel__label-row">
      <span class="theme-panel__label">壁纸模式</span>
    </div>
    <div class="theme-panel__mode-grid" id="theme-wallpaper-modes">
      <button type="button" class="theme-panel__mode-btn is-active" data-value="banner">横幅壁纸</button>
      <button type="button" class="theme-panel__mode-btn" data-value="fullscreen">全屏壁纸</button>
      <button type="button" class="theme-panel__mode-btn" data-value="transparent">全屏透明</button>
      <button type="button" class="theme-panel__mode-btn" data-value="solid">纯色背景</button>
    </div>
  </section>

  <section class="theme-panel__section">
    <div class="theme-panel__label-row">
      <span class="theme-panel__label">壁纸透明度</span>
      <span class="theme-panel__value" id="theme-wallpaper-opacity-value">80%</span>
    </div>
    <input type="range" id="theme-wallpaper-opacity" class="theme-panel__range" min="0" max="100" value="80">
  </section>

  <section class="theme-panel__section">
    <div class="theme-panel__label-row">
      <span class="theme-panel__label">背景模糊度</span>
      <span class="theme-panel__value" id="theme-bg-blur-value">10.0px</span>
    </div>
    <input type="range" id="theme-bg-blur" class="theme-panel__range" min="0" max="30" step="0.5" value="10">
  </section>

  <section class="theme-panel__section">
    <div class="theme-panel__label-row">
      <span class="theme-panel__label">卡片透明度</span>
      <span class="theme-panel__value" id="theme-card-opacity-value">50%</span>
    </div>
    <input type="range" id="theme-card-opacity" class="theme-panel__range" min="10" max="100" value="50">
  </section>

  <section class="theme-panel__section">
    <div class="theme-panel__label-row">
      <span class="theme-panel__label">文章布局</span>
    </div>
    <div class="theme-panel__layout-row" id="theme-layout-modes">
      <button type="button" class="theme-panel__layout-btn is-active" data-value="list">
        <span aria-hidden="true">☰</span>
        <span>列表</span>
      </button>
      <button type="button" class="theme-panel__layout-btn" data-value="grid">
        <span aria-hidden="true">▦</span>
        <span>网格</span>
      </button>
    </div>
  </section>
</div>

<button
  type="button"
  class="theme-customizer-toggle"
  id="theme-panel-open"
  aria-label="主题设置"
  aria-expanded="false"
  aria-controls="theme-panel"
  title="主题设置"
>🎨</button>
